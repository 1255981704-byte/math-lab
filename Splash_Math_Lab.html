<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE: SYSTEM LAUNCH</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. Jarvis 风格配置
           ========================================= */
        :root {
            --bg-deep: #000205;
            --bg-light: #051020;
            --glass-cyan: #aeeeff; 
            --glass-blue: #0066cc;
            --glass-white: rgba(255, 255, 255, 0.85);
            --hologram-line: rgba(174, 238, 255, 0.3);
        }

        * { box-sizing: border-box; user-select: none; -webkit-font-smoothing: antialiased; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-deep) 100%);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* =========================================
           2. 容器与背景
           ========================================= */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999;
            perspective: 1000px;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 300;
            color: var(--glass-cyan);
            transition: all 1s ease;
        }

        #intro-layer.dissolve {
            opacity: 0;
            transform: scale(1.1);
            filter: blur(10px);
            pointer-events: none;
        }

        .holo-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(174, 238, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(174, 238, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            z-index: 1;
        }

        .particles {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(174, 238, 255, 0.05) 0%, transparent 10%);
            background-size: 100% 100%;
            animation: pulse-bg 10s infinite alternate;
            z-index: 2;
        }
        @keyframes pulse-bg { 0% { opacity: 0.3; } 100% { opacity: 0.6; } }

        /* =========================================
           3. 核心反应堆
           ========================================= */
        .intro-reactor {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px; z-index: 10;
            opacity: 0; transition: opacity 1s ease;
        }

        .ring {
            position: absolute; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .ring-1 { width: 380px; height: 380px; border: 1px dashed rgba(174, 238, 255, 0.15); animation: spin 40s linear infinite; }
        .ring-2 { 
            width: 320px; height: 320px; 
            border-left: 1px solid var(--glass-cyan); 
            border-right: 1px solid var(--glass-cyan); 
            border-top: 1px solid transparent; 
            border-bottom: 1px solid transparent;
            opacity: 0.5;
            animation: spin-rev 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        .ring-3 { width: 260px; height: 260px; border: 1px solid rgba(174, 238, 255, 0.05); }

        .ring-scan {
            width: 300px; height: 300px; border-radius: 50%;
            border-top: 2px solid rgba(255, 255, 255, 0.4);
            border-left: 2px solid transparent; border-right: 2px solid transparent; border-bottom: 2px solid transparent;
            animation: spin 3s linear infinite;
            box-shadow: 0 0 15px rgba(174, 238, 255, 0.2);
        }

        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spin-rev { 0% { transform: translate(-50%, -50%) rotate(360deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } }

        #holo-canvas {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; z-index: 15; mix-blend-mode: screen;
        }

        /* =========================================
           4. HUD 面板
           ========================================= */
        .intro-hud {
            position: absolute; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px;
            opacity: 0; transition: all 1s ease-out 0.3s;
            z-index: 20; height: 180px; justify-content: center;
        }
        
        .hud-left { 
            left: 8%; text-align: right; 
            padding-right: 25px; 
            border-right: 1px solid rgba(174, 238, 255, 0.3);
            box-shadow: inset -5px 0 10px -5px rgba(174, 238, 255, 0.1);
        }
        
        .hud-right { 
            right: 8%; text-align: left; 
            padding-left: 25px; 
            border-left: 1px solid rgba(174, 238, 255, 0.3);
            box-shadow: inset 5px 0 10px -5px rgba(174, 238, 255, 0.1);
            width: 280px;
        }

        .math-row { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: rgba(174, 238, 255, 0.7); 
            letter-spacing: 1px; height: 20px; line-height: 20px; 
            display: flex; align-items: center;
        }
        .hud-left .math-row { justify-content: flex-end; }
        .hud-right .math-row { justify-content: flex-start; }
        
        .math-label { color: var(--glass-cyan); margin: 0 10px; font-weight: 500; font-size: 10px; opacity: 0.8; }
        .math-value { color: #fff; font-weight: 400; text-shadow: 0 0 8px rgba(174, 238, 255, 0.5); }

        .hud-left::after, .hud-right::after {
            content: ''; position: absolute; top: 0; width: 10px; height: 1px; background: var(--glass-cyan);
        }
        .hud-left::after { right: 0; }
        .hud-right::after { left: 0; }

        .hud-left::before, .hud-right::before {
            content: ''; position: absolute; bottom: 0; width: 10px; height: 1px; background: var(--glass-cyan);
        }
        .hud-left::before { right: 0; }
        .hud-right::before { left: 0; }

        /* =========================================
           5. 标题与交互按钮
           ========================================= */
        .title-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; text-align: center; width: 100%; 
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; 
        }

        .main-title-group {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            opacity: 0; filter: blur(15px); transform: scale(1.05);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .main-title-group.active { opacity: 1; filter: blur(0); transform: scale(1); }

        .title-en {
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 4.5rem; letter-spacing: 12px; line-height: 1;
            color: #fff;
            text-shadow: 0 0 20px rgba(174, 238, 255, 0.6);
            margin: 0;
        }

        .title-cn {
            font-family: 'Noto Sans SC', sans-serif; font-weight: 400;
            font-size: 2rem; letter-spacing: 25px; line-height: 1.5;
            color: var(--glass-cyan); opacity: 0.8;
            margin-top: 10px; padding-left: 25px;
        }

        .founder-info {
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; letter-spacing: 4px; color: rgba(255,255,255,0.6);
            opacity: 0; transform: translateY(10px);
            transition: all 0.8s ease 0.5s;
            text-transform: uppercase;
        }
        .founder-info.active { opacity: 1; transform: translateY(0); }
        .founder-label { color: var(--glass-cyan); margin-right: 10px; font-size: 0.8rem; }

        /* [ ENTER LAB ] 按钮样式 - 增强清晰度和层级 */
        .enter-wrapper {
            margin-top: 60px;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: auto;
            z-index: 9999;
            transform: translateY(20px);
        }
        .enter-wrapper.visible { opacity: 1; transform: translateY(0); }

        .enter-btn {
            background: rgba(0, 5, 10, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(174, 238, 255, 0.5);
            color: var(--glass-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; letter-spacing: 4px;
            padding: 14px 35px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .enter-btn:hover {
            background: rgba(174, 238, 255, 0.15);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(174, 238, 255, 0.4);
            color: #fff;
        }
        
        .enter-btn::before { content: '['; position: absolute; left: 10px; transition: 0.3s; opacity: 0.5; }
        .enter-btn::after { content: ']'; position: absolute; right: 10px; transition: 0.3s; opacity: 0.5; }
        .enter-btn:hover::before { left: 5px; opacity: 1; }
        .enter-btn:hover::after { right: 5px; opacity: 1; }

        .system-online .intro-reactor { opacity: 1; }
        .system-online .intro-hud { opacity: 1; }
    </style>
</head>
<body>

    <div id="intro-layer">
        <div class="particles"></div>
        <div class="holo-grid"></div>

        <div class="intro-reactor" id="reactor">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-scan"></div>
            <div class="ring ring-3"></div>
            <canvas id="holo-canvas"></canvas>
        </div>

        <div class="intro-hud hud-left">
            <div class="math-row"><span class="math-label">CONST.e</span> <span class="math-value">2.718</span></div>
            <div class="math-row"><span class="math-label">CONST.π</span> <span class="math-value">3.141</span></div>
            <div class="math-row"><span class="math-label">VAR.φ</span> <span class="math-value">1.618</span></div>
            <div class="math-row" style="margin-top:10px; opacity:0.5; font-size:9px;">// SYSTEM CHECK</div>
        </div>

        <div class="intro-hud hud-right">
            <div class="math-row"><span class="math-label">TARGET</span> <span class="math-value">AP / AL / IB</span></div>
            <div class="math-row"><span class="math-label">MODULE</span> <span class="math-value" id="val-func">LOADING...</span></div>
            <div class="math-row"><span class="math-label">STATUS</span> <span class="math-value" style="color:#fff; text-shadow:0 0 5px var(--glass-cyan)">STANDBY</span></div>
            <div class="math-row" style="margin-top:10px; opacity:0.5; font-size:9px;">// WAITING FOR INPUT</div>
        </div>

        <div class="title-container">
            <div class="main-title-group" id="main-title-group">
                <h1 class="title-en">IGNITE MATH LAB</h1>
                <h2 class="title-cn">点燃数学实验室</h2>
            </div>
            
            <div class="founder-info" id="founder-info">
                <span class="founder-label">FOUNDERS</span> Huandong Cao <span style="color:#445566; margin:0 5px;">|</span> Prof. Pang
            </div>

            <div class="enter-wrapper" id="enter-wrapper">
                <button class="enter-btn" onclick="enterSystem()">
                    ENTER LAB
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===============================================
        // 1. 全息球绘制 (保持 Jarvis 风格)
        // ===============================================
        const canvas = document.getElementById('holo-canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = 220 * dpr; canvas.height = 220 * dpr;
        ctx.scale(dpr, dpr);

        let points = []; 
        const numPoints = 50; 
        for(let i=0; i<numPoints; i++) {
            const theta = Math.acos( -1 + ( 2 * i ) / numPoints );
            const phi = Math.sqrt( numPoints * Math.PI ) * theta;
            points.push({ 
                x: 90 * Math.cos(phi) * Math.sin(theta), 
                y: 90 * Math.sin(phi) * Math.sin(theta), 
                z: 90 * Math.cos(theta) 
            });
        }
        let angle = 0;
        let animationFrameId;

        function drawSphere() {
            ctx.clearRect(0, 0, 220, 220);
            ctx.fillStyle = '#aeeeff'; 
            ctx.strokeStyle = 'rgba(174, 238, 255, 0.15)';
            ctx.lineWidth = 0.5;
            
            angle += 0.005; 
            ctx.beginPath();
            
            const ca = Math.cos(angle);
            const sa = Math.sin(angle);

            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                let x = p.x * ca - p.z * sa;
                let z = p.x * sa + p.z * ca;
                let y = p.y;
                let scale = 250 / (250 + z); 
                let px = 110 + x * scale; let py = 110 + y * scale;
                let size = 1.2 * scale;
                
                ctx.moveTo(px, py); 
                ctx.arc(px, py, size, 0, Math.PI * 2);
                
                for(let j=i+1; j<points.length; j++) {
                    let p2 = points[j];
                    let dx = p.x-p2.x; let dy = p.y-p2.y; let dz = p.z-p2.z;
                    if((dx*dx + dy*dy + dz*dz) < 1000) {
                        let x2 = p2.x * ca - p2.z * sa;
                        let z2 = p2.x * sa + p2.z * ca;
                        let scale2 = 250 / (250 + z2);
                        ctx.moveTo(px, py); ctx.lineTo(110 + x2 * scale2, 110 + p2.y * scale2);
                    }
                }
            }
            ctx.fill(); ctx.stroke();
            animationFrameId = requestAnimationFrame(drawSphere);
        }
        drawSphere();

        // ===============================================
        // 2. 数学公式模拟
        // ===============================================
        const formulas = ['f(x) = x²', '∫ e^x dx', 'd/dx ln(x)', '∑ 1/n²'];
        let fIdx = 0;
        setInterval(() => {
            document.getElementById('val-func').innerText = formulas[fIdx];
            fIdx = (fIdx + 1) % formulas.length;
        }, 1200);

        // ===============================================
        // 3. 动画时序与交互 (跳转到 ignite_math_lab.html)
        // ===============================================
        document.addEventListener('DOMContentLoaded', () => {
            const interfaceDiv = document.getElementById('intro-layer');
            const mainTitleGroup = document.getElementById('main-title-group');
            const founderInfo = document.getElementById('founder-info');
            const enterWrapper = document.getElementById('enter-wrapper');
            
            // 0.5s: 反应堆启动
            setTimeout(() => { interfaceDiv.classList.add('system-online'); }, 500);
            
            // 1.5s: 标题出现
            setTimeout(() => { 
                mainTitleGroup.classList.add('active'); 
                founderInfo.classList.add('active'); 
            }, 1500);
            
            // 1.8s: 按钮紧接着出现
            setTimeout(() => {
                enterWrapper.classList.add('visible');
            }, 1800);
        });

        // 点击按钮触发的操作
        function enterSystem() {
            const layer = document.getElementById('intro-layer');
            const btn = document.querySelector('.enter-btn');
            
            // 按钮反馈
            btn.innerHTML = "ACCESS GRANTED";
            btn.style.borderColor = "#fff";
            btn.style.boxShadow = "0 0 20px #fff";
            btn.style.background = "rgba(255, 255, 255, 0.1)";

            // 播放离场动画
            setTimeout(() => {
                layer.classList.add('dissolve');
            }, 400);

            // 跳转到目标页面
            setTimeout(() => {
                window.location.href = "ignite_math_lab.html"; // <<< 目标页面已设置 >>>
            }, 1200);
        }
    </script>
</body>
</html>
