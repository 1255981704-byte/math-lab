<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>IGNITE: DASHBOARD V36 [Dynamic Jump - No Alert]</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ignite-core.css">
    
    <style>
        /* --- 载入动画专用样式 (直接嵌入，不依赖外部CSS) --- */
        #boot-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000510;
            z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 隐藏状态 */
        #boot-layer.finished {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1); /* 轻微放大消失效果 */
        }

        /* 科技圆环 */
        .boot-spinner {
            width: 80px; height: 80px;
            border: 2px solid rgba(0, 243, 255, 0.1);
            border-top: 2px solid #00f3ff;
            border-radius: 50%;
            animation: bootSpin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            position: relative;
        }
        
        .boot-spinner::before {
            content: ''; position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            border-bottom: 2px solid #0077ff;
            animation: bootSpin 2s linear infinite reverse;
        }

        @keyframes bootSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 文字信息 */
        .boot-text {
            margin-top: 30px;
            color: #00f3ff;
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00f3ff;
        }

        .boot-log {
            margin-top: 10px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            height: 20px;
        }

        /* 进度条 */
        .boot-bar-box {
            width: 200px; height: 2px;
            background: #112233;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .boot-bar-fill {
            width: 0%; height: 100%;
            background: #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
            transition: width 0.2s linear;
        }

        /* 背景网格微效 */
        .boot-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: -1;
        }
    </style>
</head>
<body>

    <script>

        window.addEventListener('load', () => {
            const bootLayer = document.getElementById('boot-layer');
            const bootFill = document.getElementById('bootFill');
            const bootLog = document.getElementById('bootLog');
            
            // 模拟加载进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if(progress > 100) progress = 100;
                
                bootFill.style.width = progress + "%";
                
                // 随机更新文字
                if(progress < 30) bootLog.innerText = "LOADING ASSETS...";
                else if(progress < 60) bootLog.innerText = "DECRYPTING DATA STREAMS...";
                else if(progress < 90) bootLog.innerText = "ESTABLISHING SECURE LINK...";
                else bootLog.innerText = "ACCESS GRANTED.";

                if(progress === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        bootLayer.classList.add('finished');
                        // 动画结束后完全移除，避免阻挡点击
                        setTimeout(() => bootLayer.style.display = 'none', 600);
                    }, 500);
                }
            }, 30); // 速度设置：数字越小越快
        });

                id: 8, en: "FINAL REVIEW", cn: "第8章：总复习", url: "#",
                msg: "EXAM PROTOCOLS ENGAGED. Restricted Area.",
                locked: true,
                subs: [
                    {c:"8.1", e:"Key Concepts Review", z:"核心概念串讲", u:"#"},
                    {c:"8.2", e:"MCQ Strategies", z:"多项选择题策略", u:"#"},
                    {c:"8.3", e:"FRQ Strategies", z:"自由问答题策略", u:"#"},
                    {c:"8.4", e:"Practice Exam", z:"全真模拟考试与讲评", u:"#"}
                ]
            }
        ];

        // --- 状态变量 ---
        let targetURL = ""; 

        // INIT SYSTEM
        (function initSystem() {
            const navList = document.getElementById('navList');
            curriculum.forEach((item, index) => {
                const btn = document.createElement('div');
                btn.className = `nav-btn ${item.locked ? 'locked' : ''}`;
                btn.id = `nav-${index}`;
                btn.onclick = () => loadUnit(index);
                btn.innerHTML = `
                    <div class="nb-id">UNIT 0${item.id}</div>
                    <div class="nb-title">${item.en}</div>
                    <div class="nb-cn">${item.cn}</div>
                `;
                navList.appendChild(btn);
            });

            loadUnit(4); // 默认高亮 Unit 5
        })();

        function loadUnit(index) {
            const data = curriculum[index];

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${index}`).classList.add('active');

            document.getElementById('viewEn').innerText = data.en;
            document.getElementById('viewCn').innerText = data.cn;
            
            const pMsg = document.getElementById('pangMsg');
            pMsg.innerText = `>> PANG: ${data.msg}`;
            pMsg.style.opacity = '0.5';
            setTimeout(() => pMsg.style.opacity = '1', 100);

            // 更新 targetURL
            if(data.subs.length > 0) {
                targetURL = data.subs[0].u;
            } else {
                targetURL = "#";
            }
            
            // 根据 targetURL 启用/禁用 Enter 按钮
            document.getElementById('enterBtn').disabled = (targetURL === '#');


            const subGrid = document.getElementById('subGrid');
            subGrid.innerHTML = '';
            
            data.subs.forEach((sub, subIndex) => {
                const card = document.createElement('div');
                card.className = 'sub-card';
                // 仅选择章节
                card.onclick = function() { 
                    selectSub(this, sub.u); 
                };
                
                card.innerHTML = `
                    <div class="sc-id">SEC ${sub.c}</div>
                    <div class="sc-title">${sub.e}</div>
                    <div class="sc-cn">${sub.z}</div>
                `;
                // 默认选中第一个子章节
                if (subIndex === 0) {
                    card.classList.add('selected');
                }
                subGrid.appendChild(card);
            });
        }

        function selectSub(el, url) {
            document.querySelectorAll('.sub-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            targetURL = url; // 更新选中的目标URL
            document.getElementById('enterBtn').disabled = (targetURL === '#');
        }

        // --- 核心优化：Launch 函数改为自适应、动态无提示跳转 ---
        function launch() {
            // 检查是否选择了有效章节
            if(!targetURL || targetURL === '#') {
                alert(">> PANG: Please select a section first.");
                return;
            }
            
            const btn = document.getElementById('enterBtn');
            btn.innerHTML = "ENGAGING...";
            btn.disabled = true; 
            
            // 立即动态跳转到当前选定的小节地址（如选 2.1 会去 2-1.html，选 5.1 会去 5-1.html）
            console.log(`执行无提示动态跳转至: ${targetURL}`);
            window.location.href = targetURL; 
        }
