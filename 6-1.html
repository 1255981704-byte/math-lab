<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE: 6.1 Anti-derivative</title> <!-- 【修改点1：网页标题】 -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ignite-core.css"> <!-- 所有的伟大样式都在这一个文件里 -->
</head>
<body>
    <div class="fx-layer fx-grid"></div>

    <!-- 自动引入公共头部和公共抽屉侧边栏 -->
    {% include header.html %}
    
    <div class="interface">
        {% include sidebar.html %}

        <div class="main-view">
            <div class="view-body">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                
                <div class="vh-group">
                    <div class="title-wrapper">
                        <!-- 【修改点2：课程大标题】 -->
                        <div class="vh-main">ANTI-DERIVATIVE</div>
                        <div class="vh-sub">反导数与不定积分</div>
                    </div>
                    <div class="author-tag">INSTRUCTOR: <b>HUANDONG CAO</b></div>
                </div>

                <!-- 导航按钮 -->
                <div class="control-deck">
                    <button class="mode-btn active" onclick="switchView('lecture', this)">LECTURE</button>
                    <button class="mode-btn" onclick="switchView('notes', this)">NOTES</button>
                    <button class="mode-btn" onclick="switchView('assign', this)">ASSIGNMENT</button>
                    <button class="mode-btn" onclick="switchView('quiz', this)">QUIZ</button>
                    <button class="mode-btn lab-btn" onclick="switchView('lab', this)">IGNITE MATH LAB</button>
                </div>

                <!-- 内容面板区域 -->
                <div style="flex:1; position:relative; width: 100%; height: 100%; overflow: hidden;">
                    
                    <!-- 1. 视频 -->
                    <div id="view-lecture" class="stark-panel active">
                        <div class="panel-header">
                            <div class="ph-title">VIDEO FEED</div><div class="ph-meta">1080P // REC</div>
                        </div>
                        <div class="panel-body" style="padding: 20px; flex:1; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.2);">
                            <div class="video-wrapper">
                                <!-- 【修改点3：放入本课专属视频】 -->
                                <video id="lectureVideo" controls><source src="6.1.mp4" type="video/mp4"></video>
                                <div class="vid-overlay-live">● LIVE</div><div class="vid-overlay-text">IGNITE SECURE STREAM</div>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 笔记 / 3. 作业 / 4. 实验室 / 5. 测验 (按需修改 iframe 的 src) -->
                    <div id="view-notes" class="stark-panel"><div class="panel-body" style="padding:0; flex:1;"><iframe src="notes6-1.html" class="iframe-container"></iframe></div></div>
                    <div id="view-assign" class="stark-panel"><iframe src="assignment6-1.html" class="iframe-container"></iframe></div>
                    <div id="view-lab" class="stark-panel"><div class="panel-body" style="padding:0; flex:1;"><iframe src="derivative.html" class="iframe-container"></iframe></div></div>
                    <div id="view-quiz" class="stark-panel"><iframe src="quiz6-1.html" class="iframe-container"></iframe></div>
                </div>

                <div class="view-footer" style="margin-top:auto; padding-top:15px; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink:0;">
                    <span style="font-family:'Share Tech Mono'; color:#456; font-size:10px;">SYSTEM STABLE // PANG: Ready.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入公共 JS 逻辑 -->
    <script src="ignite-ui.js"></script>
</body>
</html>
