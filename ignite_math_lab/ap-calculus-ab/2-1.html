<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE: 2.1 DEFINITION & RATE</title>
    <!-- 引入字体和公共样式 -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ignite-core.css">
    
    <!-- 当前页面特有的样式（之前定好的悬浮HUD、大边距、16:9居中视频全在这里） -->
    <style>
        html, body {
            height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0;
            display: flex; flex-direction: column; background: #000205; 
        }
        .interface, .main-view { background: transparent !important; border: none !important; box-shadow: none !important; }
        .interface { flex: 1; display: flex; overflow: hidden; position: relative; }
        .main-view { flex: 1; height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* HUD 控制台 */
        .view-body { 
            flex: 1; width: calc(100% - 320px); max-width: 1400px; margin: 30px auto; 
            display: flex; flex-direction: column; padding: 40px; overflow: hidden; box-sizing: border-box; position: relative; 
            background: rgba(0, 15, 30, 0.5); border: 1px solid rgba(0, 243, 255, 0.15); box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(8px); border-radius: 4px; transition: padding 0.5s cubic-bezier(0.23, 1, 0.32, 1), width 0.5s ease;
        }
        @media (max-width: 1200px) { .view-body { width: calc(100% - 120px); } }
        @media (max-width: 900px) { .view-body { width: calc(100% - 40px); padding: 30px; margin: 20px auto; } }

        /* 动画与折叠 */
        .vh-group { max-height: 200px; opacity: 1; transform: translateY(0) scale(1); filter: blur(0); margin-bottom: 20px; transition: max-height 0.5s cubic-bezier(0.23, 1, 0.32, 1), margin 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease-out, transform 0.4s ease-in, filter 0.4s linear; transform-origin: top left; will-change: transform, opacity, max-height; }
        .view-body.focus-mode { padding-top: 25px; }
        .view-body.focus-mode .vh-group { max-height: 0; margin-bottom: 0; padding-bottom: 0; opacity: 0; transform: translateY(-30px) scale(0.95); filter: blur(10px); pointer-events: none; border-bottom: none; }

        /* 控制台按钮 */
        .control-deck { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid var(--border-dim); padding-bottom: 20px; flex-shrink: 0; }
        .mode-btn { height: 45px; padding: 0 25px; background: rgba(0, 30, 60, 0.3); border: 1px solid rgba(0, 243, 255, 0.2); color: #678; font-family: 'Rajdhani'; font-weight: 700; font-size: 14px; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px); display: flex; align-items: center; gap: 10px; }
        .mode-btn:hover, .mode-btn.active { background: rgba(0, 243, 255, 0.1); border-color: var(--arc-cyan); color: var(--arc-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); }
        .mode-btn.lab-btn { margin-left: auto; border: 1px solid rgba(255, 85, 0, 0.4); color: var(--arc-orange); background: rgba(255, 85, 0, 0.05); padding: 0 30px; font-weight: 800; letter-spacing: 2px; }
        .mode-btn.lab-btn:hover, .mode-btn.lab-btn.active { background: rgba(255, 85, 0, 0.15); border-color: #ffaa00; color: #fff; box-shadow: 0 0 25px rgba(255, 85, 0, 0.3), inset 0 0 10px rgba(255, 85, 0, 0.1); text-shadow: 0 0 8px rgba(255, 170, 0, 0.8); }
        .mode-btn.lab-btn svg { transition: transform 0.3s; }
        .mode-btn.lab-btn:hover svg { transform: scale(1.2); filter: drop-shadow(0 0 5px #ffaa00); }

        .stark-panel { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
        .stark-panel.active { display: flex; }
        .iframe-container { width: 100%; height: 100%; border: none; display: block; background: transparent; }

        /* 16:9 全息居中视频 */
        .video-wrapper { width: 100%; max-width: 1000px; aspect-ratio: 16 / 9; position: relative; background: #000; border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); overflow: hidden; }
        .video-wrapper video { width: 100%; height: 100%; object-fit: contain; outline: none; background: #000; }
        .vid-overlay-live { position: absolute; top: 15px; left: 15px; color: #ff3333; font-weight: bold; font-family: 'Share Tech Mono', monospace; animation: blink 2s infinite; z-index: 2; pointer-events: none; text-shadow: 0 0 10px rgba(255,51,51,0.5); }
        .vid-overlay-text { position: absolute; bottom: 15px; left: 15px; color: rgba(255,255,255,0.5); font-family: 'Share Tech Mono', monospace; font-size: 12px; z-index: 2; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="fx-layer fx-grid"></div>

    <!-- 神奇魔法1：一行代码引入顶部栏！ -->
    {% include header.html %}

    <div class="interface">
        
        <!-- 神奇魔法2：一行代码引入整个侧边栏！ -->
        {% include sidebar.html %}

        <div class="main-view">
            
            <div class="view-body">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                
                <div class="vh-group">
                    <div class="title-wrapper">
                        <!-- 【注意】这里是这一节课专属的标题！如果要新建 2-2.html，只需改这里的字 -->
                        <div class="vh-main">DEFINITION & RATE</div>
                        <div class="vh-sub">导数的定义与作为变化率</div>
                    </div>
                    <div class="author-tag">INSTRUCTOR: <b>HUANDONG CAO</b></div>
                </div>

                <div class="control-deck">
                    <button class="mode-btn active" onclick="switchView('lecture', this)">LECTURE</button>
                    <button class="mode-btn" onclick="switchView('notes', this)">NOTES</button>
                    <button class="mode-btn" onclick="switchView('assign', this)">ASSIGNMENT</button>
                    <button class="mode-btn" onclick="switchView('quiz', this)">QUIZ</button>
                    <button class="mode-btn lab-btn" onclick="switchView('lab', this)">IGNITE MATH LAB</button>
                </div>

                <div style="flex:1; position:relative; width: 100%; height: 100%; overflow: hidden;">
                    
                    <div id="view-lecture" class="stark-panel active">
                        <div class="panel-header">
                            <div class="ph-title">VIDEO FEED</div><div class="ph-meta">1080P // REC</div>
                        </div>
                        <div class="panel-body" style="padding: 20px; flex:1; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.2);">
                            <div class="video-wrapper">
                                <!-- 【注意】这里是本课专属的视频链接 -->
                                <video id="lectureVideo" controls><source src="2.1.mp4" type="video/mp4"></video>
                                <div class="vid-overlay-live">● LIVE</div>
                                <div class="vid-overlay-text">IGNITE SECURE STREAM</div>
                            </div>
                        </div>
                    </div>

                    <div id="view-notes" class="stark-panel">
                        <div class="panel-body" style="padding: 0; flex:1;">
                            <iframe src="notes2-1.html" class="iframe-container"></iframe>
                        </div>
                    </div>

                    <div id="view-assign" class="stark-panel">
                        <iframe src="assignment2-1.html" class="iframe-container"></iframe>
                    </div>

                    <div id="view-lab" class="stark-panel">
                        <div class="panel-body" style="padding:0; flex:1;">
                            <iframe src="derivative.html" class="iframe-container"></iframe>
                        </div>
                    </div>

                    <div id="view-quiz" class="stark-panel">
                        <iframe src="quiz2-1.html" class="iframe-container"></iframe>
                    </div>
                </div>

                <div class="view-footer" style="margin-top:auto; padding-top:15px; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink:0;">
                    <span style="font-family:'Share Tech Mono'; color:#456; font-size:10px;">SYSTEM STABLE // PANG: Ready.</span>
                </div>
            </div>
        </div>

    </div>

    <!-- 引入刚刚提取出来的公共脚本 -->
    <script src="ignite-ui.js"></script>
</body>
</html>
