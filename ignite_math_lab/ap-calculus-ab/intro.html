<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE ECOSYSTEM // INITIALIZING</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-void: #000000;
            --arc-cyan: #00f3ff; 
            --arc-blue: #0077ff;
            --bg-radial: radial-gradient(circle at center, #0a1525 0%, #000000 100%);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-radial);
            font-family: 'Rajdhani', sans-serif;
            color: var(--arc-cyan);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 优化后的背景层 (减少渲染开销) --- */
        .hex-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0, 243, 255, 0.08) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.2;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            z-index: 1;
            /* 静态背景不需要动画，或者使用 transform 移动 */
            will-change: opacity;
        }
        
        .star-dust {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: radial-gradient(1px 1px at 10% 10%, rgba(255,255,255,0.3) 50%, transparent 50%);
            background-size: 400px 400px; opacity: 0.4;
            /* 使用 translate3d 开启 GPU 加速 */
            animation: galaxy-rotate 120s linear infinite;
            will-change: transform;
            z-index: 1;
        }

        .grid-floor {
            position: absolute; width: 200%; height: 100%; bottom: -50%; left: -50%;
            background: linear-gradient(transparent 98%, rgba(0, 243, 255, 0.1) 99%), linear-gradient(90deg, transparent 98%, rgba(0, 243, 255, 0.1) 99%);
            background-size: 80px 80px; 
            transform: perspective(500px) rotateX(75deg); /* 优化 3D 投影 */
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            animation: grid-slide 10s linear infinite;
            will-change: background-position;
            z-index: 2;
        }

        /* --- 反应堆 (移除昂贵的 box-shadow 动画) --- */
        .intro-reactor {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px; z-index: 10;
            will-change: transform;
        }
        .ring { position: absolute; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); will-change: transform; }
        
        .ring-1 { 
            width: 380px; height: 380px; 
            border: 2px dashed rgba(0, 243, 255, 0.2); 
            animation: spin 30s linear infinite; 
        }
        
        .ring-2 { 
            width: 340px; height: 340px; 
            border-top: 2px solid var(--arc-cyan); 
            border-bottom: 2px solid var(--arc-cyan); 
            animation: spin-rev 8s linear infinite; 
            /* 静态阴影比动态阴影性能好得多 */
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15); 
        }
        
        .ring-3 { 
            width: 280px; height: 280px; 
            border: 1px solid rgba(0, 243, 255, 0.1); 
        }
        .ring-3::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(0, 243, 255, 0.1) 30deg, transparent 60deg);
            border-radius: 50%; animation: spin 4s linear infinite;
        }

        #holo-canvas {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; z-index: 15; mix-blend-mode: screen;
        }

        /* --- 标题容器 --- */
        .title-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; text-align: center; width: 100%; pointer-events: none; /* 防止遮挡按钮点击 */
            display: flex; flex-direction: column; align-items: center;
        }

        .main-title-group {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            opacity: 0; 
            /* 移除 filter: blur，这是造成卡顿的最大原因 */
            transform: scale(1.1) translateY(30px);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: opacity, transform;
        }
        .main-title-group.active { opacity: 1; transform: scale(1) translateY(0); }

        .title-en { font-weight: 700; font-size: 3.8rem; letter-spacing: 8px; line-height: 1; color: #fff; text-shadow: 0 0 25px var(--arc-cyan); margin: 0; }
        .title-cn { font-family: 'Noto Sans SC'; font-weight: 700; font-size: 2.2rem; letter-spacing: 20px; color: #fff; text-shadow: 0 0 15px var(--arc-cyan); margin: 0; padding-left: 20px; }
        
        .founder-info { 
            margin-top: 35px; font-size: 1.1rem; letter-spacing: 3px; color: #fff; 
            opacity: 0; transform: translateY(20px); 
            transition: all 0.8s ease 0.6s; 
        }
        .founder-info.active { opacity: 0.8; transform: translateY(0); }

        /* --- Enter Button --- */
        .enter-container {
            position: absolute; top: 75%; width: 100%; text-align: center; z-index: 100;
        }
        .enter-system-btn {
            padding: 15px 40px;
            background: rgba(0,0,0,0.5); /* 增加一点背景让点击区域更明显 */
            border: 1px solid var(--arc-cyan);
            color: var(--arc-cyan);
            font-family: 'Share Tech Mono';
            font-size: 18px;
            letter-spacing: 4px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s;
            clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px);
            pointer-events: auto;
        }
        .enter-system-btn.active { opacity: 1; transform: translateY(0); }
        .enter-system-btn:hover { background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); color: #fff; }

        @keyframes galaxy-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes grid-slide { from { background-position: 0 0; } to { background-position: 0 80px; } }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spin-rev { 0% { transform: translate(-50%, -50%) rotate(360deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } }
    </style>
</head>
<body>

    <div class="star-dust"></div>
    <div class="hex-grid"></div>
    <div class="grid-floor"></div>

    <div class="intro-reactor">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <canvas id="holo-canvas"></canvas>
    </div>

    <div class="title-container">
        <div class="main-title-group" id="main-title-group">
            <h1 class="title-en">IGNITE ECOSYSTEM</h1>
            <h2 class="title-cn">智火生态</h2>
        </div>
        
        <div class="founder-info" id="founder-info">
            <span style="color:var(--arc-cyan); font-weight:bold;">FOUNDER</span> 曹奂东
        </div>
    </div>

    <div class="enter-container">
        <button class="enter-system-btn" id="enterBtn" onclick="window.location.href='index.html'">
            ENTER SYSTEM >>
        </button>
    </div>

    <script>
        // 1. 优化的全息球动画 (Performance Optimized)
        const canvas = document.getElementById('holo-canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        // 限制 Canvas 尺寸，避免在高分屏上渲染像素过多
        const size = 200;
        canvas.width = size * dpr; canvas.height = size * dpr;
        ctx.scale(dpr, dpr);
        ctx.lineWidth = 1; // 线条变细，提升性能感

        // 减少粒子数到 32 (视觉效果足够，且为 2 的幂，计算更整齐)
        const numPoints = 32; 
        let points = [];
        
        // 预计算点的位置
        for(let i=0; i<numPoints; i++) {
            const theta = Math.acos( -1 + ( 2 * i ) / numPoints );
            const phi = Math.sqrt( numPoints * Math.PI ) * theta;
            points.push({ 
                x: 80 * Math.cos(phi) * Math.sin(theta), 
                y: 80 * Math.sin(phi) * Math.sin(theta), 
                z: 80 * Math.cos(theta) 
            });
        }

        let angle = 0;
        let animationFrameId;

        function drawSphere() {
            // 使用 clearRect 而不是重置 canvas 宽度
            ctx.clearRect(0, 0, size, size);
            
            ctx.fillStyle = '#00f3ff'; 
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)'; // 降低线条透明度，减少混合计算压力
            
            angle += 0.008; // 稍微减慢旋转速度，看起来更稳重
            const ca = Math.cos(angle); 
            const sa = Math.sin(angle);

            // 第一遍循环：计算投影点
            const projected = [];
            for (let i = 0; i < numPoints; i++) {
                let p = points[i];
                // 简单的 Y 轴旋转矩阵
                let x = p.x * ca - p.z * sa;
                let z = p.x * sa + p.z * ca;
                
                // 简单的透视投影
                let scale = 250 / (250 + z); 
                let px = 100 + x * scale; 
                let py = 100 + p.y * scale;
                
                projected.push({x: px, y: py, scale: scale});
                
                // 绘制点
                ctx.beginPath();
                ctx.arc(px, py, 1.2 * scale, 0, Math.PI * 2);
                ctx.fill();
            }

            // 第二遍循环：连线 (优化：只连接距离较近的点，且避免重复计算)
            // 这是一个 O(N^2) 操作，但因为 N 只有 32，计算量很小 (32*31/2 = 496次)
            ctx.beginPath();
            for(let i=0; i<numPoints; i++) {
                for(let j=i+1; j<numPoints; j++) {
                    const p1 = projected[i];
                    const p2 = projected[j];
                    // 简单的距离检查 (不开方，提升性能)
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distSq = dx*dx + dy*dy;
                    
                    // 只有距离够近才连线 (阈值 1800 约等于 42px)
                    if (distSq < 1800) {
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                    }
                }
            }
            ctx.stroke();

            animationFrameId = requestAnimationFrame(drawSphere);
        }
        
        // 启动 Canvas
        drawSphere();

        // 2. DOM 动画时序
        window.addEventListener('load', () => {
            // 延迟一点点，让浏览器先渲染完首屏
            setTimeout(() => { 
                document.getElementById('main-title-group').classList.add('active'); 
                document.getElementById('founder-info').classList.add('active'); 
            }, 500);
            
            setTimeout(() => {
                document.getElementById('enterBtn').classList.add('active');
            }, 2500); // 按钮稍微早一点出来，不用等那么久
        });
    </script>
</body>
</html>
